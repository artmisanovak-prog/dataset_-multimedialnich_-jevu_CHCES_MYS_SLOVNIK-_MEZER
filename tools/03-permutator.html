<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Permutátor | Dataset Chceš myš</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #fff;
            color: #111;
            font-family: 'Georgia', 'Times New Roman', serif;
            line-height: 1.6;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        h1, h2, h3 {
            font-weight: 300;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 0.3rem;
            margin-bottom: 1.5rem;
        }
        h1 { font-size: 2.2rem; }
        h2 { font-size: 1.6rem; }
        .toolbar {
            background: #f5f5f5;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid #aaa;
        }
        .dataset-selector {
            margin-bottom: 1rem;
            font-family: 'Courier New', monospace;
        }
        select, button {
            background: #fff;
            border: 1px solid #333;
            padding: 0.5rem 1rem;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            margin-right: 0.5rem;
            cursor: pointer;
        }
        button {
            background: #eaeaea;
            transition: 0.2s;
        }
        button:hover {
            background: #ccc;
        }
        .block-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            margin-bottom: 2rem;
        }
        .block-selector {
            flex: 1;
            min-width: 250px;
        }
        .block-card {
            border: 1px solid #444;
            padding: 1rem;
            margin-bottom: 0.5rem;
            background: #fafafa;
            cursor: pointer;
            transition: 0.1s;
        }
        .block-card.selected {
            border: 3px solid #000;
            background: #eee;
        }
        .block-card .vrstva {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }
        .block-card .text {
            font-size: 1rem;
        }
        /* typografické odlišení vrstev */
        .vrstva-filozoficky { font-family: 'Georgia', serif; }
        .vrstva-kulturni { font-family: 'Georgia', serif; font-style: italic; }
        .vrstva-jazykovy { font-family: 'Arial', sans-serif; }
        .vrstva-groteskni { font-family: 'Arial', sans-serif; font-style: italic; }
        .vrstva-ironicky { font-family: 'Courier New', monospace; }
        .vrstva-surrealisticky { font-family: 'Courier New', monospace; font-style: italic; }
        .vrstva-absurdni { font-family: 'Times New Roman', serif; font-weight: bold; letter-spacing: 1px; }
        .vrstva-psychologicky { font-weight: 300; font-family: 'Verdana', sans-serif; }
        .vrstva-naivni { font-variant: small-caps; }
        .vrstva-intro { font-weight: bold; font-size: 0.95rem; }
        .vrstva-archetypalni { line-height: 2; letter-spacing: 2px; }

        .permutations {
            border-top: 1px solid #aaa;
            padding-top: 2rem;
        }
        .perm-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        .perm-item {
            border: 1px solid #666;
            padding: 1rem;
            background: #f2f2f2;
        }
        .perm-item .order {
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: #444;
            margin-bottom: 0.5rem;
        }
        .perm-item .block-text {
            margin-bottom: 0.5rem;
            padding-left: 0.5rem;
            border-left: 2px solid #888;
        }
    </style>
</head>
<body>
    <h1>🔄 Permutátor</h1>
    <p>Vybrané bloky (max 3) seřaď všemi způsoby. Každá permutace odhalí nový význam.</p>

    <div class="toolbar">
        <div class="dataset-selector">
            <label for="datasetSelect">Vyber dataset:</label>
            <select id="datasetSelect" style="min-width: 250px;"></select>
            <span id="blockCount">0 bloků načteno</span>
        </div>
    </div>

    <div class="block-panel">
        <div class="block-selector">
            <h2>Bloky (kliknutím vybereš)</h2>
            <div id="blocksContainer"></div>
        </div>
        <div class="block-selector">
            <h2>Vybrané (max 3)</h2>
            <div id="selectedContainer"></div>
            <button onclick="clearSelection()" style="margin-top: 1rem;">Vymazat vše</button>
        </div>
    </div>

    <div class="permutations" id="permutationsSection" style="display: none;">
        <h2>Permutace vybraných bloků</h2>
        <div id="permutationsList" class="perm-list"></div>
    </div>

    <script>
        // Data
        let allBlocks = [];
        let selectedBlocks = [];

        // Elementy
        const datasetSelect = document.getElementById('datasetSelect');
        const blocksContainer = document.getElementById('blocksContainer');
        const selectedContainer = document.getElementById('selectedContainer');
        const permutationsSection = document.getElementById('permutationsSection');
        const permutationsList = document.getElementById('permutationsList');
        const blockCountSpan = document.getElementById('blockCount');

        // Načtení manifestu
        async function loadManifest() {
            try {
                const response = await fetch('../dataset/manifest.json');
                if (!response.ok) throw new Error('Manifest nenalezen');
                const manifest = await response.json();
                
                datasetSelect.innerHTML = '';
                manifest.datasets.forEach(ds => {
                    const option = document.createElement('option');
                    option.value = ds.file;
                    option.textContent = ds.name;
                    datasetSelect.appendChild(option);
                });

                if (manifest.datasets.length > 0) {
                    loadDataset(manifest.datasets[0].file);
                }
            } catch (e) {
                console.error('Chyba při načítání manifestu:', e);
                datasetSelect.innerHTML = '<option value="_sample/sample.json">Ukázka zdarma (ručně)</option>';
                loadDataset('_sample/sample.json');
            }
        }

        // Načtení datasetu
        async function loadDataset(file) {
            try {
                const response = await fetch('../dataset/' + file);
                if (!response.ok) throw new Error('Soubor nenalezen');
                const data = await response.json();
                allBlocks = data;
                selectedBlocks = [];
                blockCountSpan.innerText = `${allBlocks.length} bloků načteno`;
                renderBlocks();
                renderSelected();
                permutationsSection.style.display = 'none';
            } catch (e) {
                alert('Nepodařilo se načíst dataset: ' + file);
                allBlocks = [];
                blockCountSpan.innerText = '0 bloků načteno';
                blocksContainer.innerHTML = '';
                selectedContainer.innerHTML = '';
            }
        }

        // Vykreslení seznamu všech bloků
        function renderBlocks() {
            blocksContainer.innerHTML = '';
            allBlocks.forEach((block, idx) => {
                const card = document.createElement('div');
                card.className = `block-card ${selectedBlocks.includes(block) ? 'selected' : ''}`;
                card.onclick = () => selectBlock(block);

                const vrstvaDiv = document.createElement('div');
                vrstvaDiv.className = `vrstva vrstva-${(block.vrstva || block.type || 'filozoficky').toLowerCase()}`;
                vrstvaDiv.innerText = block.vrstva || block.type || 'neurčeno';

                const textDiv = document.createElement('div');
                textDiv.className = 'text';
                textDiv.innerText = block.text;

                card.appendChild(vrstvaDiv);
                card.appendChild(textDiv);
                blocksContainer.appendChild(card);
            });
        }

        // Výběr bloku
        function selectBlock(block) {
            if (selectedBlocks.includes(block)) {
                selectedBlocks = selectedBlocks.filter(b => b !== block);
            } else {
                if (selectedBlocks.length >= 3) {
                    alert('Můžeš vybrat maximálně 3 bloky.');
                    return;
                }
                selectedBlocks.push(block);
            }
            renderBlocks();
            renderSelected();
            if (selectedBlocks.length >= 2) {
                generatePermutations();
            } else {
                permutationsSection.style.display = 'none';
            }
        }

        // Vykreslení vybraných
        function renderSelected() {
            selectedContainer.innerHTML = '';
            selectedBlocks.forEach(block => {
                const card = document.createElement('div');
                card.className = 'block-card';
                card.onclick = () => selectBlock(block);

                const vrstvaDiv = document.createElement('div');
                vrstvaDiv.className = `vrstva vrstva-${(block.vrstva || block.type || 'filozoficky').toLowerCase()}`;
                vrstvaDiv.innerText = block.vrstva || block.type || 'neurčeno';

                const textDiv = document.createElement('div');
                textDiv.className = 'text';
                textDiv.innerText = block.text;

                card.appendChild(vrstvaDiv);
                card.appendChild(textDiv);
                selectedContainer.appendChild(card);
            });
        }

        function clearSelection() {
            selectedBlocks = [];
            renderBlocks();
            renderSelected();
            permutationsSection.style.display = 'none';
        }

        // Generování permutací (pro 2 nebo 3 bloky)
        function generatePermutations() {
            if (selectedBlocks.length < 2) return;
            const perms = [];
            if (selectedBlocks.length === 2) {
                perms.push([selectedBlocks[0], selectedBlocks[1]]);
                perms.push([selectedBlocks[1], selectedBlocks[0]]);
            } else if (selectedBlocks.length === 3) {
                const [a, b, c] = selectedBlocks;
                perms.push([a, b, c]);
                perms.push([a, c, b]);
                perms.push([b, a, c]);
                perms.push([b, c, a]);
                perms.push([c, a, b]);
                perms.push([c, b, a]);
            }

            permutationsList.innerHTML = '';
            perms.forEach((perm, idx) => {
                const item = document.createElement('div');
                item.className = 'perm-item';
                const orderDiv = document.createElement('div');
                orderDiv.className = 'order';
                orderDiv.innerText = `permutace ${idx + 1}`;
                item.appendChild(orderDiv);
                perm.forEach(block => {
                    const textDiv = document.createElement('div');
                    textDiv.className = 'block-text';
                    textDiv.innerHTML = `<span class="vrstva-${(block.vrstva || block.type || 'filozoficky').toLowerCase()}">${block.text}</span>`;
                    item.appendChild(textDiv);
                });
                permutationsList.appendChild(item);
            });

            permutationsSection.style.display = 'block';
        }

        // Event listener pro změnu datasetu
        datasetSelect.addEventListener('change', (e) => {
            loadDataset(e.target.value);
        });

        // Start
        window.onload = loadManifest;
    </script>
</body>
</html>
