<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pavouk | Dataset Chceš myš</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #fff;
            color: #111;
            font-family: 'Georgia', serif;
            padding: 1rem;
        }
        #toolbar {
            background: #f5f5f5;
            border: 1px solid #aaa;
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }
        select, button {
            background: #fff;
            border: 1px solid #333;
            padding: 0.4rem 0.8rem;
            font-family: 'Courier New', monospace;
            cursor: pointer;
        }
        button:hover { background: #ddd; }
        #canvasContainer {
            border: 1px solid #666;
            background: #fefefe;
            width: 100%;
            height: 700px;
            position: relative;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #fff;
        }
        #info {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #333;
        }
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1rem;
            font-size: 0.8rem;
            border-top: 1px dashed #aaa;
            padding-top: 1rem;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .legend-color {
            width: 16px;
            height: 16px;
            background: #000;
            border-radius: 50%;
        }
        .legend-color.line { height: 2px; width: 20px; background: #333; border-radius: 0; }
    </style>
</head>
<body>
    <div id="toolbar">
        <div>
            <label for="datasetSelect">Dataset:</label>
            <select id="datasetSelect"></select>
        </div>
        <span id="blockCount">0 bloků</span>
        <button onclick="resetSimulation()">Reset pozic</button>
        <button onclick="toggleDrag()" id="dragBtn">🔒 Tahání zamčeno</button>
    </div>
    <div id="canvasContainer">
        <canvas id="graphCanvas" width="1000" height="700"></canvas>
    </div>
    <div id="info">Klikni na uzel pro detail. Stejné vrstvy jsou propojeny.</div>
    <div class="legend" id="legend"></div>

    <script>
        let allBlocks = [];
        let nodes = [];
        let edges = [];
        let selectedNode = null;
        let dragging = false;
        let dragNode = null;
        let dragEnabled = false;
        let mouseX, mouseY;
        let animationFrame;
        let ctx;
        const canvas = document.getElementById('graphCanvas');
        const W = 1000, H = 700;
        ctx = canvas.getContext('2d');

        const datasetSelect = document.getElementById('datasetSelect');
        const blockCountSpan = document.getElementById('blockCount');
        const dragBtn = document.getElementById('dragBtn');

        // Načtení manifestu
        async function loadManifest() {
            try {
                const response = await fetch('../dataset/manifest.json');
                if (!response.ok) throw new Error('Manifest nenalezen');
                const manifest = await response.json();
                
                datasetSelect.innerHTML = '';
                manifest.datasets.forEach(ds => {
                    const option = document.createElement('option');
                    option.value = ds.file;
                    option.textContent = ds.name;
                    datasetSelect.appendChild(option);
                });

                if (manifest.datasets.length > 0) {
                    loadDataset(manifest.datasets[0].file);
                }
            } catch (e) {
                console.error('Chyba při načítání manifestu:', e);
                datasetSelect.innerHTML = '<option value="_sample/sample.json">Ukázka zdarma (ručně)</option>';
                loadDataset('_sample/sample.json');
            }
        }

        // Načtení datasetu
        async function loadDataset(file) {
            try {
                const response = await fetch('../dataset/' + file);
                if (!response.ok) throw new Error('Soubor nenalezen');
                const data = await response.json();
                allBlocks = data;
                blockCountSpan.innerText = `${allBlocks.length} bloků`;
                buildGraph();
            } catch (e) {
                alert('Nepodařilo se načíst dataset: ' + file);
                allBlocks = [];
                blockCountSpan.innerText = '0 bloků';
            }
        }

        // Postaví uzly a hrany (podle společných vrstev)
        function buildGraph() {
            nodes = allBlocks.map((block, idx) => ({
                id: idx,
                text: block.text,
                vrstva: block.vrstva || block.type || 'filozofický',
                x: Math.random() * W,
                y: Math.random() * H,
                vx: 0, vy: 0,
                fixed: false
            }));

            edges = [];
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i+1; j < nodes.length; j++) {
                    if (nodes[i].vrstva === nodes[j].vrstva) {
                        edges.push({ from: i, to: j, weight: 1 });
                    }
                }
            }
            if (animationFrame) cancelAnimationFrame(animationFrame);
            simulate();
        }

        // Fyzikální simulace
        function simulate() {
            const repulsion = 500;
            const springLength = 150;
            const springStrength = 0.1;
            const dt = 0.1;

            function step() {
                nodes.forEach(n => { n.ax = 0; n.ay = 0; });

                for (let i = 0; i < nodes.length; i++) {
                    for (let j = i+1; j < nodes.length; j++) {
                        let dx = nodes[i].x - nodes[j].x;
                        let dy = nodes[i].y - nodes[j].y;
                        let dist = Math.sqrt(dx*dx + dy*dy) || 1;
                        let force = repulsion / (dist * dist);
                        let fx = (dx / dist) * force;
                        let fy = (dy / dist) * force;
                        nodes[i].ax += fx;
                        nodes[i].ay += fy;
                        nodes[j].ax -= fx;
                        nodes[j].ay -= fy;
                    }
                }

                edges.forEach(e => {
                    let a = nodes[e.from];
                    let b = nodes[e.to];
                    let dx = a.x - b.x;
                    let dy = a.y - b.y;
                    let dist = Math.sqrt(dx*dx + dy*dy) || 1;
                    let force = (springLength - dist) * springStrength;
                    let fx = (dx / dist) * force;
                    let fy = (dy / dist) * force;
                    a.ax += fx;
                    a.ay += fy;
                    b.ax -= fx;
                    b.ay -= fy;
                });

                nodes.forEach(n => {
                    if (!n.fixed) {
                        n.vx += n.ax * dt;
                        n.vy += n.ay * dt;
                        n.vx *= 0.95;
                        n.vy *= 0.95;
                        n.x += n.vx;
                        n.y += n.vy;
                        n.x = Math.max(20, Math.min(W-20, n.x));
                        n.y = Math.max(20, Math.min(H-20, n.y));
                    }
                });

                draw();
                animationFrame = requestAnimationFrame(step);
            }
            step();
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);

            edges.forEach(e => {
                let a = nodes[e.from];
                let b = nodes[e.to];
                ctx.beginPath();
                ctx.moveTo(a.x, a.y);
                ctx.lineTo(b.x, b.y);
                ctx.strokeStyle = '#aaa';
                ctx.lineWidth = 0.5 + e.weight;
                ctx.stroke();
            });

            nodes.forEach((n, i) => {
                ctx.beginPath();
                if (n.vrstva.toLowerCase().includes('filozof')) ctx.arc(n.x, n.y, 8, 0, 2*Math.PI);
                else if (n.vrstva.toLowerCase().includes('kulturn')) ctx.rect(n.x-8, n.y-8, 16, 16);
                else if (n.vrstva.toLowerCase().includes('jazyk')) {
                    ctx.moveTo(n.x, n.y-10);
                    ctx.lineTo(n.x+10, n.y+5);
                    ctx.lineTo(n.x-10, n.y+5);
                    ctx.closePath();
                } else {
                    ctx.arc(n.x, n.y, 8, 0, 2*Math.PI);
                }

                if (n.vrstva.toLowerCase().includes('absurd')) ctx.fillStyle = '#111';
                else if (n.vrstva.toLowerCase().includes('iron')) ctx.fillStyle = '#333';
                else if (n.vrstva.toLowerCase().includes('psycholog')) ctx.fillStyle = '#666';
                else if (n.vrstva.toLowerCase().includes('archetyp')) ctx.fillStyle = '#999';
                else ctx.fillStyle = '#ccc';
                ctx.fill();
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 1;
                ctx.stroke();

                if (selectedNode === i) {
                    ctx.beginPath();
                    ctx.arc(n.x, n.y, 12, 0, 2*Math.PI);
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            });

            if (selectedNode !== null) {
                let n = nodes[selectedNode];
                ctx.font = '12px Georgia';
                ctx.fillStyle = '#000';
                ctx.fillText(n.text.substring(0, 30) + '…', n.x + 15, n.y - 15);
            }
        }

        // Interakce myší
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            mouseX = (e.clientX - rect.left) * scaleX;
            mouseY = (e.clientY - rect.top) * scaleY;

            let minDist = 20;
            let hit = null;
            nodes.forEach((n, idx) => {
                let d = Math.hypot(mouseX - n.x, mouseY - n.y);
                if (d < minDist) {
                    minDist = d;
                    hit = idx;
                }
            });

            if (hit !== null) {
                selectedNode = hit;
                if (dragEnabled) {
                    dragNode = hit;
                    nodes[hit].fixed = true;
                }
            } else {
                selectedNode = null;
            }
            draw();
        });

        canvas.addEventListener('mousemove', (e) => {
            if (dragNode !== null) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                nodes[dragNode].x = (e.clientX - rect.left) * scaleX;
                nodes[dragNode].y = (e.clientY - rect.top) * scaleY;
            }
        });

        canvas.addEventListener('mouseup', () => {
            if (dragNode !== null) {
                nodes[dragNode].fixed = false;
                dragNode = null;
            }
        });

        function toggleDrag() {
            dragEnabled = !dragEnabled;
            dragBtn.innerText = dragEnabled ? '🔓 Tahání povoleno' : '🔒 Tahání zamčeno';
        }

        function resetSimulation() {
            nodes.forEach(n => {
                n.x = Math.random() * W;
                n.y = Math.random() * H;
                n.vx = 0; n.vy = 0;
                n.fixed = false;
            });
        }

        datasetSelect.addEventListener('change', (e) => {
            loadDataset(e.target.value);
        });

        window.onload = loadManifest;
    </script>
</body>
</html>
