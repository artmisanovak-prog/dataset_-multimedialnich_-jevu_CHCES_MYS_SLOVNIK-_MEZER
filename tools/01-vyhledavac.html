<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vyhledávač | Dataset Chceš myš</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #fff;
            color: #111;
            font-family: 'Georgia', serif;
            line-height: 1.6;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        h1, h2 {
            font-weight: 300;
            border-bottom: 1px solid #ccc;
            padding-bottom: 0.3rem;
            margin-bottom: 1.5rem;
        }
        h1 { font-size: 2.2rem; }
        h2 { font-size: 1.6rem; }
        .toolbar {
            background: #f5f5f5;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid #aaa;
        }
        select, input, button {
            background: #fff;
            border: 1px solid #333;
            padding: 0.5rem 1rem;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
            cursor: pointer;
        }
        button {
            background: #eaeaea;
            transition: 0.2s;
        }
        button:hover { background: #ccc; }
        .search-box {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1rem;
            margin-top: 1rem;
        }
        .search-box input {
            flex: 1;
            min-width: 250px;
        }
        .stats {
            font-size: 0.9rem;
            color: #444;
            margin-top: 1rem;
        }
        .results {
            margin-top: 2rem;
        }
        .block-card {
            border: 1px solid #444;
            padding: 1rem;
            margin-bottom: 0.5rem;
            background: #fafafa;
        }
        .block-card .vrstva {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }
        .block-card .text {
            font-size: 1rem;
            margin-bottom: 0.25rem;
        }
        .block-card .pole {
            font-size: 0.8rem;
            color: #555;
            font-family: 'Courier New', monospace;
        }
        .highlight {
            background: #ccc;
            font-weight: bold;
        }
        /* typografické odlišení vrstev */
        .vrstva-filozoficky { font-family: 'Georgia', serif; }
        .vrstva-kulturni { font-family: 'Georgia', serif; font-style: italic; }
        .vrstva-jazykovy { font-family: 'Arial', sans-serif; }
        .vrstva-groteskni { font-family: 'Arial', sans-serif; font-style: italic; }
        .vrstva-ironicky { font-family: 'Courier New', monospace; }
        .vrstva-surrealisticky { font-family: 'Courier New', monospace; font-style: italic; }
        .vrstva-absurdni { font-family: 'Times New Roman', serif; font-weight: bold; letter-spacing: 1px; }
        .vrstva-psychologicky { font-weight: 300; font-family: 'Verdana', sans-serif; }
        .vrstva-naivni { font-variant: small-caps; }
        .vrstva-intro { font-weight: bold; font-size: 0.95rem; }
        .vrstva-archetypalni { line-height: 2; letter-spacing: 2px; }
    </style>
</head>
<body>
    <h1>🔍 Vyhledávač</h1>
    <p>Fulltextové vyhledávání v textech a polích bloků.</p>

    <div class="toolbar">
        <div>
            <label for="datasetSelect">Vyber dataset:</label>
            <select id="datasetSelect" style="min-width: 250px;"></select>
            <span id="blockCount">0 bloků načteno</span>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Zadej hledaný výraz..." oninput="search()">
            <label>
                <input type="checkbox" id="caseSensitive"> Rozlišovat velikost
            </label>
            <label>
                <input type="checkbox" id="searchInFields"> Hledat i v polích (fields)
            </label>
        </div>
        <div class="stats" id="stats"></div>
    </div>

    <div class="results" id="results"></div>

    <script>
        // Data
        let allBlocks = [];

        // Elementy
        const datasetSelect = document.getElementById('datasetSelect');
        const searchInput = document.getElementById('searchInput');
        const caseSensitiveCheck = document.getElementById('caseSensitive');
        const searchInFieldsCheck = document.getElementById('searchInFields');
        const blockCountSpan = document.getElementById('blockCount');
        const statsDiv = document.getElementById('stats');
        const resultsDiv = document.getElementById('results');

        // Načtení manifestu
        async function loadManifest() {
            try {
                const response = await fetch('../dataset/manifest.json');
                if (!response.ok) throw new Error('Manifest nenalezen');
                const manifest = await response.json();
                
                // Naplnění selectu
                datasetSelect.innerHTML = '';
                manifest.datasets.forEach(ds => {
                    const option = document.createElement('option');
                    option.value = ds.file;
                    option.textContent = ds.name;
                    datasetSelect.appendChild(option);
                });

                // Načtení prvního datasetu
                if (manifest.datasets.length > 0) {
                    loadDataset(manifest.datasets[0].file);
                }
            } catch (e) {
                console.error('Chyba při načítání manifestu:', e);
                statsDiv.innerText = 'Nepodařilo se načíst manifest. Zkus načíst ukázku.';
                // Přidáme alespoň možnost načíst ukázku ručně
                datasetSelect.innerHTML = '<option value="_sample/sample.json">Ukázka zdarma (ručně)</option>';
                loadDataset('_sample/sample.json');
            }
        }

        // Načtení konkrétního datasetu
        async function loadDataset(file) {
            try {
                const response = await fetch('../dataset/' + file);
                if (!response.ok) throw new Error('Soubor nenalezen');
                const data = await response.json();
                allBlocks = data;
                blockCountSpan.innerText = `${allBlocks.length} bloků načteno`;
                search(); // zobraz vše
            } catch (e) {
                alert('Nepodařilo se načíst dataset: ' + file);
                allBlocks = [];
                blockCountSpan.innerText = '0 bloků načteno';
                resultsDiv.innerHTML = '';
            }
        }

        // Vyhledávání
        function search() {
            const query = searchInput.value.trim();
            const caseSensitive = caseSensitiveCheck.checked;
            const searchInFields = searchInFieldsCheck.checked;

            if (!query) {
                renderResults(allBlocks);
                statsDiv.innerText = `Zobrazeno všech ${allBlocks.length} bloků.`;
                return;
            }

            const filtered = allBlocks.filter(block => {
                let haystack = block.text;
                if (searchInFields && block.fields && Array.isArray(block.fields)) {
                    haystack += ' ' + block.fields.join(' ');
                }
                if (!caseSensitive) {
                    return haystack.toLowerCase().includes(query.toLowerCase());
                } else {
                    return haystack.includes(query);
                }
            });

            renderResults(filtered);
            statsDiv.innerText = `Nalezeno ${filtered.length} bloků z ${allBlocks.length}.`;
        }

        // Zobrazení výsledků
        function renderResults(blocks) {
            resultsDiv.innerHTML = '';

            blocks.forEach(block => {
                const card = document.createElement('div');
                card.className = 'block-card';

                const vrstvaDiv = document.createElement('div');
                vrstvaDiv.className = `vrstva vrstva-${(block.vrstva || block.type || 'filozoficky').toLowerCase()}`;
                vrstvaDiv.innerText = block.vrstva || block.type || 'neurčeno';

                const textDiv = document.createElement('div');
                textDiv.className = 'text';
                textDiv.innerText = block.text;

                const poleDiv = document.createElement('div');
                poleDiv.className = 'pole';
                poleDiv.innerText = block.fields ? 'pole: ' + block.fields.join(', ') : '';

                card.appendChild(vrstvaDiv);
                card.appendChild(textDiv);
                if (block.fields) card.appendChild(poleDiv);
                resultsDiv.appendChild(card);
            });

            if (blocks.length === 0) {
                resultsDiv.innerHTML = '<p>Žádné bloky neodpovídají hledání.</p>';
            }
        }

        // Event listener pro změnu datasetu
        datasetSelect.addEventListener('change', (e) => {
            loadDataset(e.target.value);
        });

        // Spuštění po načtení stránky
        window.onload = loadManifest;
    </script>
</body>
</html>
